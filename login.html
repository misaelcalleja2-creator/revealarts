<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Reveal Arts</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0a0a0f;
  color: #fafaf8;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  color: #fafaf8;
}
.dot { width: 8px; height: 8px; background: #c8f135; border-radius: 50%; display: inline-block; }
.card {
  background: #111118;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 32px;
  width: 100%;
  max-width: 400px;
}
.tabs {
  display: flex;
  background: rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 4px;
}
.tab {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.45);
  transition: all 0.2s;
}
.tab.active {
  background: #c8f135;
  color: #0a0a0f;
}
.tab:not(.active):hover {
  color: #fff;
  background: rgba(255,255,255,0.08);
}
.panel { display: none; }
.panel.active { display: block; }
h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  margin-bottom: 6px;
}
.sub {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 24px;
  line-height: 1.5;
}
.badge {
  background: rgba(200,241,53,0.08);
  border: 1px solid rgba(200,241,53,0.2);
  border-radius: 10px;
  padding: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 20px;
  line-height: 1.5;
}
.badge strong { color: #c8f135; }
label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  margin-bottom: 6px;
  margin-top: 14px;
}
input[type=email], input[type=password] {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  color: #fff;
  outline: none;
}
input[type=email]:focus, input[type=password]:focus {
  border-color: rgba(200,241,53,0.5);
}
input::placeholder { color: rgba(255,255,255,0.2); }
.btn {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #c8f135;
  color: #0a0a0f;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,241,53,0.3); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.msg {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
  display: none;
}
.msg.error { background: rgba(255,92,58,0.12); border: 1px solid rgba(255,92,58,0.3); color: #ff5c3a; }
.msg.success { background: rgba(200,241,53,0.08); border: 1px solid rgba(200,241,53,0.2); color: #c8f135; }
.back { text-align: center; margin-top: 20px; font-size: 12px; color: rgba(255,255,255,0.3); }
.back a { color: rgba(255,255,255,0.5); text-decoration: none; }
.back a:hover { color: #fff; }
.check-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-top: 14px;
  cursor: pointer;
}
.check-row input[type=checkbox] {
  width: 16px;
  height: 16px;
  margin-top: 2px;
  accent-color: #c8f135;
  flex-shrink: 0;
  cursor: pointer;
}
.check-row span {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  line-height: 1.5;
}
.check-row span a { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

<a href="index.html" class="logo"><span class="dot"></span>Reveal Arts</a>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="tab-in" onclick="show('in')">Sign In</button>
    <button class="tab" id="tab-up" onclick="show('up')">Create Account</button>
  </div>

  <!-- SIGN IN -->
  <div class="panel active" id="panel-in">
    <h2>Welcome back 👋</h2>
    <p class="sub">Sign in to access your Reveal Arts account.</p>
    <label>Email</label>
    <input type="email" id="in-email" placeholder="you@school.edu">
    <label>Password</label>
    <input type="password" id="in-pass" placeholder="••••••••">
    <button class="btn" id="in-btn" onclick="doSignIn()">Sign In</button>
    <div class="msg" id="in-msg"></div>
  </div>

  <!-- SIGN UP -->
  <div class="panel" id="panel-up">
    <div class="badge">🎉 <strong>7-day free trial</strong> — no credit card required. Full access to everything.</div>
    <h2>Create account</h2>
    <p class="sub">Join teachers making math more engaging.</p>
    <label>Email</label>
    <input type="email" id="up-email" placeholder="you@school.edu">
    <label>Password</label>
    <input type="password" id="up-pass" placeholder="At least 6 characters">
    <label class="check-row">
      <input type="checkbox" id="up-emails" checked>
      <span>I agree to receive occasional product updates and teaching tips from Reveal Arts. You can unsubscribe anytime.</span>
    </label>
    <button class="btn" id="up-btn" onclick="doSignUp()">Start Free Trial</button>
    <div class="msg" id="up-msg"></div>
  </div>

  <div class="back"><a href="index.html">← Back to home</a></div>
</div>

<script>
// Tab switching
function show(which) {
  document.getElementById('panel-in').classList.toggle('active', which === 'in');
  document.getElementById('panel-up').classList.toggle('active', which === 'up');
  document.getElementById('tab-in').classList.toggle('active', which === 'in');
  document.getElementById('tab-up').classList.toggle('active', which === 'up');
}

// Message helper
function msg(id, type, text) {
  var el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

// Supabase config
var SB_URL = 'https://zionhfdaksktpwcvjnde.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppb25oZmRha3NrdHB3Y3ZqbmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzYyMjcsImV4cCI6MjA5MDg1MjIyN30.6nLi71KlbXvRsC5Z0g51XGxiXgOBu9TKxbs6T2mYm9A';

// Call Supabase REST API directly - no SDK needed
async function sbFetch(path, body) {
  var r = await fetch(SB_URL + path, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY
    },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function doSignIn() {
  var email = document.getElementById('in-email').value.trim();
  var pass = document.getElementById('in-pass').value;
  if (!email || !pass) { msg('in-msg','error','Please fill in both fields.'); return; }
  var btn = document.getElementById('in-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var data = await sbFetch('/auth/v1/token?grant_type=password', { email: email, password: pass });
    if (data.error || data.error_description) {
      msg('in-msg','error', data.error_description || data.error || 'Sign in failed.');
    } else {
      localStorage.setItem('sb_access_token', data.access_token);
      localStorage.setItem('sb_refresh_token', data.refresh_token);
      window.location.href = 'creator_v8.html';
    }
  } catch(e) {
    msg('in-msg','error','Connection error. Please try again.');
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}

async function doSignUp() {
  var email = document.getElementById('up-email').value.trim();
  var pass = document.getElementById('up-pass').value;
  if (!email || !pass) { msg('up-msg','error','Please fill in both fields.'); return; }
  if (pass.length < 6) { msg('up-msg','error','Password must be at least 6 characters.'); return; }
  var btn = document.getElementById('up-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    var emailsOk = document.getElementById('up-emails').checked;
    var data = await sbFetch('/auth/v1/signup', { email: email, password: pass, data: { marketing_emails: emailsOk } });
    if (data.error || data.error_description) {
      msg('up-msg','error', data.error_description || data.error || 'Sign up failed.');
    } else {
      msg('up-msg','success','Account created! Check your email for a confirmation link, then sign in.');
    }
  } catch(e) {
    msg('up-msg','error','Connection error. Please try again.');
  }
  btn.disabled = false; btn.textContent = 'Start Free Trial';
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (document.getElementById('panel-in').classList.contains('active')) doSignIn();
  else doSignUp();
});

// Check if already logged in
var token = localStorage.getItem('sb_access_token');
if (token) window.location.href = 'creator_v8.html';
</script>
</body>
</html>
