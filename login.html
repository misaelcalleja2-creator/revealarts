<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Daily Reps</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0a0a0f;
  --bg: #f7f6f2;
  --bg2: #eeecea;
  --white: #ffffff;
  --lime: #b8e030;
  --lime-dark: #7aaa00;
  --coral: #ff5c3a;
  --text: #1a1a24;
  --text2: #555560;
  --text3: #888894;
  --border: rgba(0,0,0,0.09);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 24px;
}

/* NAV-STYLE TOP BAR */
.top-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  background: rgba(247,246,242,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 48px;
  z-index: 100;
}
.nav-logo {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.nav-logo-circle {
  width: 36px; height: 36px; background: var(--ink); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 8px; font-weight: 800;
  color: var(--lime); letter-spacing: 0.5px; text-align: center; line-height: 1.2;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.nav-logo-circle::before {
  content: ''; position: absolute; inset: 3px; border-radius: 50%;
  border: 1px solid rgba(184,224,48,0.3);
}
.nav-logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; color: var(--text); letter-spacing: -0.3px; }
.nav-logo-sub { font-size: 11px; color: var(--text3); font-weight: 400; display: block; }
.nav-signup-link {
  font-size: 13px; color: var(--text2); text-decoration: none; font-weight: 500;
}
.nav-signup-link span {
  color: var(--lime-dark); font-weight: 700;
}

/* MAIN CONTENT */
.page-wrap {
  margin-top: 64px;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0 32px;
}

/* AVATAR */
.avatar-wrap {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  overflow: hidden;
  background: var(--ink);
  margin-bottom: 24px;
  flex-shrink: 0;
  border: 3px solid var(--bg2);
}
.avatar-wrap img {
  width: 100%; height: 100%; object-fit: cover; object-position: center top;
}

/* CARD */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 36px 32px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
}
h1 {
  font-family: 'Syne', sans-serif;
  font-size: 26px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 6px;
}
.sub {
  font-size: 14px;
  color: var(--text3);
  margin-bottom: 28px;
  line-height: 1.5;
}
label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 6px;
  margin-top: 16px;
}
label:first-of-type { margin-top: 0; }
input[type=email], input[type=password], input[type=text] {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
input[type=email]:focus, input[type=password]:focus, input[type=text]:focus {
  border-color: var(--lime-dark);
  background: var(--white);
}
input::placeholder { color: var(--text3); }
.pass-wrap { position: relative; }
.pass-wrap input { padding-right: 44px; }
.reveal-btn {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer; color: var(--text3);
  padding: 4px; line-height: 0; transition: color 0.2s; display: flex; align-items: center;
}
.reveal-btn:hover { color: var(--text); }
.reveal-btn svg { width: 18px; height: 18px; }
.btn {
  width: 100%; margin-top: 24px; padding: 15px; border: none; border-radius: 10px;
  background: var(--ink); color: var(--lime);
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; letter-spacing: 0.2px;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(10,10,15,0.2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.msg {
  margin-top: 14px; padding: 11px 14px; border-radius: 9px;
  font-size: 13px; line-height: 1.5; display: none;
}
.msg.error { background: rgba(255,92,58,0.08); border: 1px solid rgba(255,92,58,0.2); color: var(--coral); }
.msg.success { background: rgba(122,170,0,0.08); border: 1px solid rgba(122,170,0,0.2); color: var(--lime-dark); }
.msg a { color: inherit; cursor: pointer; text-decoration: underline; font-weight: 700; }

/* BOTTOM LINK */
.bottom-link {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text3);
}
.bottom-link a {
  color: var(--lime-dark);
  font-weight: 700;
  text-decoration: none;
}
.bottom-link a:hover { text-decoration: underline; }

@media (max-width: 480px) {
  .top-bar { padding: 0 20px; }
  .card { padding: 28px 24px; }
}
</style>
</head>

<script>
var SB_URL = 'https://zionhfdaksktpwcvjnde.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppb25oZmRha3NrdHB3Y3ZqbmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzYyMjcsImV4cCI6MjA5MDg1MjIyN30.6nLi71KlbXvRsC5Z0g51XGxiXgOBu9TKxbs6T2mYm9A';

function toggleReveal(inputId, btn) {
  var input = document.getElementById(inputId);
  var eyeOpen = document.getElementById('icon-eye');
  var eyeOff = document.getElementById('icon-eye-off');
  if (input.type === 'password') {
    input.type = 'text';
    eyeOpen.style.display = 'none';
    eyeOff.style.display = 'block';
  } else {
    input.type = 'password';
    eyeOpen.style.display = 'block';
    eyeOff.style.display = 'none';
  }
}

function showMsg(id, type, html) {
  var el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.innerHTML = html;
  el.style.display = 'block';
}

async function doSignIn() {
  var email = document.getElementById('in-email').value.trim();
  var pass = document.getElementById('in-pass').value;
  if (!email || !pass) { showMsg('in-msg', 'error', 'Please fill in both fields.'); return; }
  var btn = document.getElementById('in-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var r = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
      body: JSON.stringify({ email: email, password: pass })
    });
    var data = await r.json();
    if (!r.ok || data.error || data.error_description) {
      var errMsg = (data.error_description || data.error || '').toLowerCase();
      if (errMsg.includes('email not confirmed')) {
        showMsg('in-msg', 'error', 'Please confirm your email first — check your inbox.');
      } else {
        showMsg('in-msg', 'error', 'Incorrect email or password. <a href="forgot.html">Reset password</a> &nbsp;·&nbsp; <a href="signup.html">Create account</a>');
      }
      btn.disabled = false; btn.textContent = 'Sign In';
      return;
    }
    localStorage.setItem('sb_access_token', data.access_token);
    localStorage.setItem('sb_refresh_token', data.refresh_token);
    window.location.href = 'dashboard.html';
  } catch(e) {
    showMsg('in-msg', 'error', 'Connection error. Please try again.');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSignIn();
});

// Auto-redirect if already logged in
var existingToken = localStorage.getItem('sb_access_token');
if (existingToken) {
  fetch(SB_URL + '/auth/v1/user', {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + existingToken }
  }).then(function(r) {
    if (r.ok) { window.location.href = 'dashboard.html'; }
    else { localStorage.removeItem('sb_access_token'); localStorage.removeItem('sb_refresh_token'); }
  }).catch(function() {
    localStorage.removeItem('sb_access_token'); localStorage.removeItem('sb_refresh_token');
  });
}
</script>
