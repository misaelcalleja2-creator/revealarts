<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Activity — The Real Sum Shady</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0f;
  color: #fafaf8;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
#loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 20px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.dot { width: 8px; height: 8px; background: #c8f135; border-radius: 50%; }
.spin {
  width: 40px; height: 40px;
  border: 3px solid rgba(200,241,53,0.2);
  border-top-color: #c8f135;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-size: 14px; color: rgba(255,255,255,0.4); }
#error-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 16px;
  text-align: center;
  padding: 32px;
}
.error-icon { font-size: 48px; }
.error-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
.error-desc { font-size: 14px; color: rgba(255,255,255,0.4); max-width: 400px; line-height: 1.6; }
.error-btn {
  background: #c8f135; color: #0a0a0f;
  border: none; border-radius: 10px;
  padding: 12px 24px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; text-decoration: none; margin-top: 8px;
}
#activity-frame {
  display: none;
  width: 100%; height: 100vh;
  border: none;
}

/* ── AI TUTOR ── */
#ai-fab {
  display: none;
  position: fixed; bottom: 20px; left: 20px; z-index: 9999;
  width: 52px; height: 52px; border-radius: 50%;
  background: #9b5de5; color: #fff;
  border: 3px solid rgba(255,255,255,0.2);
  font-size: 22px; cursor: pointer;
  box-shadow: 0 4px 20px rgba(0,0,0,0.7);
  align-items: center; justify-content: center;
  animation: aipulse 2s infinite;
}
@keyframes aipulse {
  0%,100% { box-shadow: 0 4px 20px rgba(155,93,229,0.4); }
  50% { box-shadow: 0 4px 30px rgba(155,93,229,0.9); }
}
#ai-panel {
  display: none;
  position: fixed; bottom: 82px; left: 20px; z-index: 9998;
  width: 340px; height: 480px;
  background: #1a1a2e;
  border: 1px solid rgba(155,93,229,0.35);
  border-radius: 18px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.8);
  flex-direction: column;
  font-family: 'DM Sans', sans-serif;
}
#ai-panel.open { display: flex; }
.ai-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.ai-title {
  font-family: 'Syne', sans-serif; font-size: 15px;
  font-weight: 800; color: #9b5de5;
}
.ai-badge {
  font-size: 10px; padding: 2px 8px;
  background: rgba(155,93,229,0.15);
  border: 1px solid rgba(155,93,229,0.3);
  color: rgba(155,93,229,0.9);
  border-radius: 100px;
}
.ai-close {
  background: transparent; border: none;
  color: rgba(255,255,255,0.3); font-size: 18px;
  cursor: pointer; padding: 2px 6px;
}
#ai-messages {
  flex: 1; overflow-y: scroll;
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 0;
}
.ai-msg { display: flex; flex-direction: column; gap: 3px; }
.ai-msg.bot { align-items: flex-start; }
.ai-msg.user { align-items: flex-end; }
.ai-lbl {
  font-size: 9px; font-weight: 800;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: rgba(155,93,229,0.5); margin-bottom: 1px;
}
.ai-lbl.u { color: rgba(255,255,255,0.25); text-align: right; }
.ai-bubble {
  padding: 10px 13px; font-size: 13px;
  line-height: 1.55; border-radius: 4px 14px 14px 14px;
  background: rgba(155,93,229,0.12);
  border: 1px solid rgba(155,93,229,0.2);
  color: rgba(255,255,255,0.85);
}
.ai-msg.user .ai-bubble {
  border-radius: 14px 14px 4px 14px;
  background: rgba(255,255,255,0.07);
  border-color: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.7);
  align-self: flex-end; max-width: 90%;
}
.prob-picker { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.pick-btn {
  background: rgba(155,93,229,0.1);
  border: 1px solid rgba(155,93,229,0.25);
  color: rgba(255,255,255,0.75);
  border-radius: 7px; padding: 5px 10px;
  font-size: 11px; font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .15s;
}
.pick-btn:hover { background: rgba(155,93,229,0.25); color: #fff; }
.ai-typing { display: flex; gap: 4px; align-items: center; padding: 8px 4px; }
.ai-typing span {
  width: 7px; height: 7px; background: rgba(155,93,229,0.6);
  border-radius: 50%; animation: dot .9s infinite;
}
.ai-typing span:nth-child(2) { animation-delay: .2s; }
.ai-typing span:nth-child(3) { animation-delay: .4s; }
@keyframes dot { 0%,80%,100%{transform:scale(1);opacity:.5} 40%{transform:scale(1.3);opacity:1} }
.step-block {
  font-family: 'Courier New', monospace;
  font-size: 13px; line-height: 1.9;
  background: rgba(0,0,0,0.3);
  border-radius: 8px; padding: 10px 12px;
  margin-top: 6px;
}
.step-orig { color: #fff; font-weight: 700; white-space: pre; }
.step-ops  { color: #c8f135; font-weight: 700; white-space: pre; }
.step-line { border: none; border-top: 1.5px solid rgba(255,255,255,0.3); margin: 3px 0 4px; }
.step-simp { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.frac-t    { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 1px; }
.frac-n    { border-bottom: 1.5px solid #fff; padding: 0 4px; color: #fff; font-weight: 700; line-height: 1.4; }
.frac-d    { padding: 0 4px; color: #c8f135; font-weight: 700; line-height: 1.4; }
.step-ans  { color: #c8f135; font-weight: 800; font-size: 14px; margin-top: 4px; display: block; }
.step-exp  { font-size: 10px; color: rgba(255,255,255,0.35); font-style: italic; margin-top: 2px; display: block; }
.ai-input-row {
  display: flex; gap: 6px; padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
#ai-input {
  flex: 1; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(155,93,229,0.25);
  border-radius: 10px; padding: 8px 12px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  color: #fff; outline: none;
}
#ai-input:focus { border-color: rgba(155,93,229,0.6); }
#ai-input::placeholder { color: rgba(255,255,255,0.25); }
#ai-send {
  background: #9b5de5; border: none;
  border-radius: 10px; color: #fff;
  font-size: 16px; cursor: pointer;
  padding: 0 13px; flex-shrink: 0;
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo"><span class="dot"></span>The Real Sum Shady</div>
  <div class="spin"></div>
  <div class="load-txt">Loading your activity...</div>
</div>

<div id="error-screen">
  <div class="error-icon">😕</div>
  <div class="error-title">Activity not found</div>
  <div class="error-desc">This activity link may have expired or been deleted by the teacher. Ask your teacher for an updated link.</div>
  <a href="index.html" class="error-btn">Go to home →</a>
</div>

<iframe id="activity-frame" title="Reveal Art Activity" allowfullscreen></iframe>

<!-- AI TUTOR -->
<button id="ai-fab" title="AI Tutor">🤖</button>
<div id="ai-panel">
  <div class="ai-header">
    <div class="ai-title">🤖 AI Tutor</div>
    <span class="ai-badge" id="ai-badge"></span>
    <button class="ai-close" id="ai-close">✕</button>
  </div>
  <div id="ai-messages"></div>
  <div class="ai-input-row">
    <input id="ai-input" type="text" placeholder="Ask a question..." autocomplete="off" />
    <button id="ai-send">➤</button>
  </div>
</div>

<script>
const SB_URL = 'https://zionhfdaksktpwcvjnde.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppb25oZmRha3NrdHB3Y3ZqbmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzYyMjcsImV4cCI6MjA5MDg1MjIyN30.6nLi71KlbXvRsC5Z0g51XGxiXgOBu9TKxbs6T2mYm9A';

async function loadActivity() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError(); return; }
  try {
    const r = await fetch(SB_URL + '/rest/v1/activities?id=eq.' + id + '&select=html,title', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!r.ok) { showError(); return; }
    const data = await r.json();
    if (!Array.isArray(data) || !data[0] || !data[0].html) { showError(); return; }
    const { html, title } = data[0];
    if (title) document.title = title + ' — The Real Sum Shady';
    const blob = new Blob([html], { type: 'text/html' });
    const blobUrl = URL.createObjectURL(blob);
    const frame = document.getElementById('activity-frame');
    frame.src = blobUrl;
    frame.onload = function() {
      document.getElementById('loading-screen').style.display = 'none';
      frame.style.display = 'block';
      // Ask iframe for problems after it loads
      setTimeout(function() {
        frame.contentWindow.postMessage({ type: 'GET_PROBS' }, '*');
      }, 500);
    };
  } catch(e) {
    console.error('Failed to load activity', e);
    showError();
  }
}

function showError() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
}

loadActivity();

// ── AI TUTOR ──────────────────────────────────────────────────────────────────
var aiProbs = [];
var aiSolved = new Set();
var aiHelpMax = 0;
var aiHelpUsed = 0;
var aiOpen = false;
var aiGreeted = false;
var aiCurrentProb = null;

// Listen for problems from iframe
window.addEventListener('message', function(e) {
  if (!e.data) return;
  if (e.data.type === 'PROBS_DATA') {
    aiProbs = e.data.probs || [];
    aiHelpMax = e.data.helpMax || 0;
    document.getElementById('ai-fab').style.display = 'flex';
    updateBadge();
  }
  if (e.data.type === 'SOLVED_UPDATE') {
    aiSolved = new Set(e.data.solved || []);
  }
});

// Buttons
document.getElementById('ai-fab').addEventListener('click', togglePanel);
document.getElementById('ai-close').addEventListener('click', togglePanel);
document.getElementById('ai-send').addEventListener('click', sendMessage);
document.getElementById('ai-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') sendMessage();
});

function togglePanel() {
  aiOpen = !aiOpen;
  document.getElementById('ai-panel').classList.toggle('open', aiOpen);
  document.getElementById('ai-fab').style.animation = aiOpen ? 'none' : 'aipulse 2s infinite';
  if (aiOpen && !aiGreeted) { aiGreeted = true; greet(); }
  if (aiOpen) {
    setTimeout(function() {
      var m = document.getElementById('ai-messages');
      m.scrollTop = m.scrollHeight;
      document.getElementById('ai-input').focus();
    }, 150);
  }
}

function updateBadge() {
  var b = document.getElementById('ai-badge');
  if (aiHelpMax === 0) { b.textContent = 'Unlimited'; return; }
  var left = aiHelpMax - aiHelpUsed;
  b.textContent = left + ' help' + (left !== 1 ? 's' : '') + ' left';
}

function addMsg(role, html) {
  var msgs = document.getElementById('ai-messages');
  var wrap = document.createElement('div'); wrap.className = 'ai-msg ' + role;
  var lbl = document.createElement('div');
  lbl.className = 'ai-lbl' + (role === 'user' ? ' u' : '');
  lbl.textContent = role === 'bot' ? 'AI Tutor' : 'You';
  var bubble = document.createElement('div'); bubble.className = 'ai-bubble';
  bubble.innerHTML = html;
  wrap.appendChild(lbl); wrap.appendChild(bubble);
  msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
}

function addTyping() {
  var msgs = document.getElementById('ai-messages');
  var wrap = document.createElement('div'); wrap.className = 'ai-msg bot'; wrap.id = 'ai-typing';
  var bubble = document.createElement('div'); bubble.className = 'ai-bubble';
  bubble.innerHTML = '<div class="ai-typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(bubble); msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { var t = document.getElementById('ai-typing'); if (t) t.remove(); }

function fmtEq(eq) {
  if (eq && eq.startsWith('FRAC:')) {
    var p = eq.split(':');
    return p[1] + '/' + p[2].split(' = ')[0] + ' = ' + p[2].split(' = ')[1];
  }
  return eq;
}

function greet() {
  if (aiProbs.length === 0) {
    addMsg('bot', 'Loading problems... try again in a moment!');
    return;
  }
  var unsolved = aiProbs.filter(function(p, i) { return !aiSolved.has(i); });
  if (unsolved.length === 0) { addMsg('bot', 'You solved all the problems! Amazing work!'); return; }

  var msgs = document.getElementById('ai-messages');
  var wrap = document.createElement('div'); wrap.className = 'ai-msg bot';
  var lbl = document.createElement('div'); lbl.className = 'ai-lbl'; lbl.textContent = 'AI Tutor';
  var bubble = document.createElement('div'); bubble.className = 'ai-bubble';
  bubble.innerHTML = 'Hey! I am your AI Tutor. Which problem do you want help with?';
  var picker = document.createElement('div'); picker.className = 'prob-picker';
  aiProbs.forEach(function(p, i) {
    if (aiSolved.has(i)) return;
    var btn = document.createElement('button'); btn.className = 'pick-btn';
    btn.textContent = (i+1) + '. ' + fmtEq(p.eq);
    btn.addEventListener('click', function() { requestHelp(i); });
    picker.appendChild(btn);
  });
  bubble.appendChild(picker); wrap.appendChild(lbl); wrap.appendChild(bubble);
  msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
}

function offerMore(excludeIdx) {
  var remaining = aiProbs.filter(function(p, i) { return !aiSolved.has(i) && i !== excludeIdx; });
  if (remaining.length === 0) return;
  if (aiHelpMax > 0 && (aiHelpMax - aiHelpUsed) <= 0) return;

  var msgs = document.getElementById('ai-messages');
  var wrap = document.createElement('div'); wrap.className = 'ai-msg bot';
  var lbl = document.createElement('div'); lbl.className = 'ai-lbl'; lbl.textContent = 'AI Tutor';
  var bubble = document.createElement('div'); bubble.className = 'ai-bubble';
  bubble.innerHTML = 'Need help with another one? Or type a question below!';
  var picker = document.createElement('div'); picker.className = 'prob-picker';
  aiProbs.forEach(function(p, i) {
    if (aiSolved.has(i) || i === excludeIdx) return;
    var btn = document.createElement('button'); btn.className = 'pick-btn';
    btn.textContent = (i+1) + '. ' + fmtEq(p.eq);
    btn.addEventListener('click', function() { requestHelp(i); });
    picker.appendChild(btn);
  });
  bubble.appendChild(picker); wrap.appendChild(lbl); wrap.appendChild(bubble);
  msgs.appendChild(wrap); msgs.scrollTop = msgs.scrollHeight;
}

async function requestHelp(idx) {
  if (aiHelpMax > 0 && aiHelpUsed >= aiHelpMax) { addMsg('bot', 'No more helps available. Give it your best shot!'); return; }
  if (aiSolved.has(idx)) { addMsg('bot', 'You already solved that one!'); return; }
  aiCurrentProb = idx; aiHelpUsed++; updateBadge();
  var prob = aiProbs[idx]; var eq = fmtEq(prob.eq);
  addMsg('user', 'Help me with #' + (idx+1) + ': ' + eq);
  addTyping();
  try {
    var steps = await getSteps(prob.eq, prob.ans, prob.ansDisplay);
    removeTyping();
    if (steps && steps.orig) { renderSteps(idx, steps); }
    else { addMsg('bot', 'Sorry, had trouble. Try again!'); }
  } catch(e) { removeTyping(); addMsg('bot', 'Connection issue — try again!'); }
  setTimeout(function() { offerMore(idx); }, 600);
}

async function sendMessage() {
  var inp = document.getElementById('ai-input');
  var text = inp.value.trim(); if (!text) return;
  inp.value = ''; addMsg('user', text);
  var nm = text.match(/^(\d+)$/);
  if (nm) { var idx = parseInt(nm[1])-1; if (idx >= 0 && idx < aiProbs.length) { requestHelp(idx); return; } }
  addTyping();
  try {
    var ctx = aiCurrentProb !== null
      ? 'Student is on problem ' + (aiCurrentProb+1) + ': ' + fmtEq(aiProbs[aiCurrentProb].eq)
      : 'Student is doing algebra.';
    var resp = await fetch('/api/tutor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 300, messages: [{ role: 'user', content: 'You are a friendly middle school math tutor. Keep answers to 2-3 sentences. ' + ctx + ' Student question: ' + text }] })
    });
    removeTyping();
    if (!resp.ok) { addMsg('bot', 'Connection issue — try again!'); return; }
    var data = await resp.json();
    addMsg('bot', (data.content || []).map(function(c) { return c.text || ''; }).join(''));
  } catch(e) { removeTyping(); addMsg('bot', 'Connection issue — try again!'); }
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderSteps(idx, steps) {
  var html = '<strong style="font-size:11px;color:rgba(255,255,255,0.4);">Problem ' + (idx+1) + '</strong>';
  html += '<div class="step-block">';
  html += '<div class="step-orig">' + esc(steps.orig || '') + '</div>';
  if (steps.opsRow) html += '<div class="step-ops">' + esc(steps.opsRow) + '</div>';
  html += '<hr class="step-line">';
  if (steps.simplified) html += '<div class="step-simp">' + buildFracRow(steps.simplified) + '</div>';
  if (steps.answer) html += '<div class="step-ans">' + esc(steps.answer) + '</div>';
  if (steps.explain) html += '<div class="step-exp">' + esc(steps.explain) + '</div>';
  html += '</div>';
  addMsg('bot', html);
}

function buildFracRow(row) {
  var parts = row.split('=');
  if (parts.length < 2) return esc(row);
  return renderFracTerm(parts[0].trim()) + ' <span style="color:#fff;font-weight:700;padding:0 6px;">=</span> ' + renderFracTerm(parts.slice(1).join('=').trim());
}

function renderFracTerm(term) {
  term = term.trim();
  var m = term.match(/^(.+)\/([0-9]+)$/);
  if (m) return '<span class="frac-t"><span class="frac-n">' + esc(m[1]) + '</span><span class="frac-d">' + esc(m[2]) + '</span></span>';
  return '<span style="color:#fff;font-weight:700;">' + esc(term) + '</span>';
}

async function getSteps(eq, ans, ansDisplay) {
  var cleanEq = eq.startsWith('FRAC:') ? fmtEq(eq) : eq;
  var finalAns = ansDisplay || String(ans);
  var prompt = 'You are a middle school math tutor. Solve: ' + cleanEq + '. Answer: x=' + finalAns + '. Return ONLY this JSON (no markdown): {"orig":"equation as written","opsRow":"operation row with spaces aligning ops under terms","simplified":"e.g. 2x/2 = 6/2 only if division needed else empty string","answer":"x = ' + finalAns + '","explain":"one short sentence"}. For x+4=8: put -4 under both sides in opsRow. For 5x=15: opsRow empty, put 5x/5 = 15/5 in simplified. For x/7=3: put x7 in opsRow. For 2x+4=10: subtract in opsRow, divide in simplified. Return ONLY the JSON.';
  var resp = await fetch('/api/tutor', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 400, messages: [{ role: 'user', content: prompt }] })
  });
  if (!resp.ok) return null;
  var data = await resp.json();
  var text = (data.content || []).map(function(c) { return c.text || ''; }).join('');
  try { return JSON.parse(text.replace(/```json|```/g, '').trim()); } catch(e) { return null; }
}
</script>
</body>
</html>
