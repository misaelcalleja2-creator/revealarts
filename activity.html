<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Activity — Reveal Art</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f7f6f2;
  color: #1a1a24;
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
#loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 20px;
}
.logo {
  display: flex; align-items: center; gap: 10px; text-decoration: none;
}
.logo-circle {
  width: 40px; height: 40px; background: #0a0a0f; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif; font-size: 7px; font-weight: 800;
  color: #b8e030; line-height: 1.2; text-align: center;
}
.logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #0a0a0f; }
.logo-sub { font-size: 11px; color: #888; display: block; }
.spin {
  width: 36px; height: 36px;
  border: 3px solid rgba(122,170,0,0.2);
  border-top-color: #7aaa00;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-txt { font-size: 13px; color: #888; }
#error-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 16px;
  text-align: center;
  padding: 32px;
}
.error-icon { font-size: 48px; }
.error-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; color: #0a0a0f; }
.error-desc { font-size: 14px; color: #888; max-width: 400px; line-height: 1.6; }
.error-btn {
  background: #0a0a0f; color: #b8e030;
  border: none; border-radius: 10px;
  padding: 12px 24px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
  cursor: pointer; text-decoration: none; margin-top: 8px; display: inline-block;
}
#activity-frame {
  display: none;
  width: 100%; height: 100vh;
  border: none;
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo">
    <div class="logo-circle" style="overflow:hidden;">THE<br>REAL<br>SUM<br>SHADY</div>
    <div>
      <span class="logo-text">Reveal Art</span>
      <span class="logo-sub">by The Real Sum Shady</span>
    </div>
  </div>
  <div class="spin"></div>
  <div class="load-txt">Loading your activity...</div>
</div>

<div id="error-screen">
  <div class="error-icon">😕</div>
  <div class="error-title">Activity not found</div>
  <div class="error-desc">This activity link may have expired or been deleted by the teacher. Ask your teacher for an updated link.</div>
  <a href="index.html" class="error-btn">Go home →</a>
</div>

<iframe id="activity-frame" title="Reveal Art Activity" allowfullscreen></iframe>

<script>
const SB_URL = 'https://zionhfdaksktpwcvjnde.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppb25oZmRha3NrdHB3Y3ZqbmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNzYyMjcsImV4cCI6MjA5MDg1MjIyN30.6nLi71KlbXvRsC5Z0g51XGxiXgOBu9TKxbs6T2mYm9A';

async function loadActivity() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { showError(); return; }
  try {
    const r = await fetch(SB_URL + '/rest/v1/activities?id=eq.' + id + '&select=html,title', {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!r.ok) { showError(); return; }
    const data = await r.json();
    if (!Array.isArray(data) || !data[0] || !data[0].html) { showError(); return; }
    const { html, title } = data[0];
    if (title) document.title = title + ' — Reveal Art';
    const blob = new Blob([html], { type: 'text/html' });
    const blobUrl = URL.createObjectURL(blob);
    const frame = document.getElementById('activity-frame');
    frame.src = blobUrl;
    frame.onload = function() {
      document.getElementById('loading-screen').style.display = 'none';
      frame.style.display = 'block';
    };
  } catch(e) {
    console.error('Failed to load activity', e);
    showError();
  }
}

function showError() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('error-screen').style.display = 'flex';
}

loadActivity();
</script>
</body>
</html>
